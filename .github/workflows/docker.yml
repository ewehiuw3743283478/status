name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  GO_VERSION: "1.22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-agent:
    name: Build client (linux amd64 / arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: status-agent/go.sum

      - name: Prepare Go modules
        working-directory: status-agent
        run: go mod download

      - name: Build status-agent binaries
        run: bash build-client.sh

      - name: Upload agent artifacts
        uses: actions/upload-artifact@v4
        with:
          name: status-agent-binaries
          path: |
            dist/status-agent_linux_amd64
            dist/status-agent_linux_arm64
          retention-days: 30

  build-server:
    name: Build panel image (linux amd64 / arm64) → ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push panel image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-agent:
    name: Publish client binaries to GitHub Releases
    runs-on: ubuntu-latest
    needs: build-agent
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master'
    concurrency:
      group: release-agent-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - name: Download agent artifacts
        uses: actions/download-artifact@v4
        with:
          name: status-agent-binaries
          path: dist/

      - name: Verify agent artifacts
        run: |
          test -f dist/status-agent_linux_amd64
          test -f dist/status-agent_linux_arm64
          ls -lh dist/status-agent_linux_*

      - name: Resolve release tag
        id: rel
        run: |
          case "${GITHUB_REF}" in
            refs/tags/*)
              echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              # Keep rolling "latest" as the download target for /releases/latest/download/
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "tag=latest" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: status-agent ${{ steps.rel.outputs.tag }}
          prerelease: ${{ steps.rel.outputs.prerelease }}
          make_latest: ${{ steps.rel.outputs.make_latest }}
          fail_on_unmatched_files: true
          files: |
            dist/status-agent_linux_amd64
            dist/status-agent_linux_arm64
          generate_release_notes: true