<div class="mdui-dialog webssh-dialog" id="webSSHdialog">
    <div class="mdui-dialog-title" id="webSSHdialogT">{{node.name}}</div>
    <div class="mdui-dialog-content" id="webSSHdialogC">
        <div id="terminal"></div>
    </div>
    <div class="mdui-dialog-actions">
        <button class="mdui-btn btn btn-tonal mdui-float-left" mdui-menu="{target: '#ssh-scripts'}">脚本片段</button>
        <ul class="mdui-menu mdui-menu-cascade mdui-text-left" id="ssh-scripts">
            {%for script in ssh_scripts%}
            <li class="mdui-menu-item ssh-script-item" data-script-id="{{script.id}}">
                <a>{{script.name}}</a>
            </li>
            {%endfor%}
        </ul>
        <button class="mdui-btn btn btn-tonal-accent mdui-color-theme-accent mdui-text-color-white" onclick="connect()">连接</button>
        <button class="mdui-btn btn btn-tonal-danger" onclick="dispose()">关闭</button>
    </div>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.13.0/css/xterm.css" integrity="sha384-wwWLqhC+0/OH4xtALU2T0EpLeLwQRggWU4w6m6Q5W2ih1BsI3T1r8gauD4Rku3WJ" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/xterm@4.13.0/lib/xterm.js" integrity="sha384-zNFhP+4ruyb/8J2+0I+TllMDxDxbvxbsAHGHWCxGmUpJi9FKjTKfVQeQrhsy1jmt" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.js" integrity="sha384-1z99Fy30h75RY/s/rPkqfN8NKmcrhr8zp01wGxbsfNGuiz2rCq8N4eFPwDid4IWj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.4.0/lib/xterm-addon-web-links.js" integrity="sha384-i5+nfDjaoUj+DntxYPBYZpeQgBO1vvy9uC+alDPWkqGNkrnO8kf859je7vVqTPqW" crossorigin="anonymous"></script>
    <script>async function ssh_script(id){
        if(!socket||socket.readyState!=1)return;
        var res=await postjson("/admin/ssh_scripts/get",{id});
        if(res.status&&res.data&&res.data.content)socket.send(res.data.content);
    }</script>
</div>
<script>
var webSSHdialog=new mdui.Dialog("#webSSHdialog"),
    term=null,socket=null,
    now_sid="";
function resize(){
    term.FitAddon.fit();
}
function connect(sid=now_sid){
    var path=`/admin/servers/${sid}/ws-ssh/`;
    if(socket&&socket.readyState==1)return;
    startloading();
    term.FitAddon.fit();
    socket=new WebSocket(window.location.origin.replace('http','ws')+path+JSON.stringify({
        cols:term.cols,
        rows:term.rows,
    }));
    socket.addEventListener('open',(e)=>{
        endloading();
        term.focus();
    })
    socket.addEventListener('message',(e)=>{term.write(e.data.toString("utf-8"));});
    socket.addEventListener('close',(ev)=>{});
    socket.addEventListener('error',(ev)=>{});
}
function dispose(){
    if(socket)socket.close();
    webSSHdialog.close();
}
async function webssh(sid){
    now_sid=sid;
    if(term){
        webSSHdialog.open();
        term.focus();
        connect(sid);
        return;
    }
    var H=window.screen.availHeight*0.95,
        W=document.body.clientWidth*0.95,
        TH=H-48-68-52,TW=W-48;
    E('webSSHdialog').style.height=H+'px';
    E('webSSHdialog').style.width=W+'px';
    E('webSSHdialog').style.maxHeight=H+'px';
    E('webSSHdialog').style.maxWidth=W+'px';
    E('webSSHdialogC').style.height=H-52+'px';
    E('webSSHdialogC').style.width=W+'px';
    E('terminal').style.height=TH+'px';
    E('terminal').style.width=TW+'px';
    term=new Terminal({
        cols:Math.floor(TW/8),
        rows:Math.floor(TH/8),
        cursorBlink: true,
        cursorStyle: "underline",
        scrollback: 1000,
    });
    webSSHdialog.open();
    term.open(document.getElementById('terminal'));
    term.FitAddon=new FitAddon.FitAddon();
    term.loadAddon(term.FitAddon);
    term.WebLinksAddon=new WebLinksAddon.WebLinksAddon();
    term.loadAddon(term.WebLinksAddon);
    term.onData(data=>{
        if(!socket||socket.readyState!=1){
            connect(sid);
            return;
        }
        try{
            socket.send(data);
        } catch (e){
            term.write('\r\nConnection lost, trying to connect again!\r\n');
            connect(sid);
        }
    });
    var menu=E('ssh-scripts');
    if(menu){
        menu.addEventListener('click',(e)=>{
            var item=e.target.closest('.ssh-script-item');
            if(!item)return;
            var id=item.getAttribute('data-script-id');
            if(id)ssh_script(id);
        });
    }
    connect(sid);
}
</script>
