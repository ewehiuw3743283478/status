{% set title = "管理设置" %}
{% extends "./base.html" %}
{%block page_title%}系统设置{%endblock%}
{%block page_subtitle%}<a href="/admin/servers" class="mdui-text-color-theme-text-secondary">管理服务器</a> / 设置{%endblock%}

{%block admin_content%}
<script type="application/json" id="setting_data">{{setting_baseline|tojson}}</script>

<div class="admin-form-section">
    <h3 class="admin-form-section-title"><i class="mdui-icon material-icons">tune</i>基础</h3>
    <div class="mdui-row mdui-row-md-2">
        <div class="mdui-col mdui-textfield">
            <label class="mdui-textfield-label">监听端口</label>
            <input class="mdui-textfield-input" type="number" value="{{setting.listen}}" key="listen">
        </div>
        <div class="mdui-col mdui-textfield">
            <label class="mdui-textfield-label">管理密码</label>
            <input class="mdui-textfield-input" type="password" key="password" autocomplete="new-password" placeholder="留空则不修改">
        </div>
    </div>
</div>

<div class="admin-form-section">
    <h3 class="admin-form-section-title"><i class="mdui-icon material-icons">public</i>站点</h3>
    <div class="mdui-row mdui-row-md-3">
        <div class="mdui-col mdui-textfield">
            <label class="mdui-textfield-label">站点名称</label>
            <input class="mdui-textfield-input" type="text" value="{{setting.site.name}}" key="site.name">
        </div>
        <div class="mdui-col mdui-textfield">
            <label class="mdui-textfield-label">站点网址</label>
            <input class="mdui-textfield-input" type="text" value="{{setting.site.url}}" key="site.url">
        </div>
        <div class="mdui-col mdui-textfield">
            <label class="mdui-textfield-label">默认主题</label>
            <select class="mdui-select" key="theme">
                <option value="card" {%if setting.theme != "list"%}selected{%endif%}>卡片</option>
                <option value="list" {%if setting.theme == "list"%}selected{%endif%}>列表</option>
            </select>
        </div>
    </div>
</div>

<div class="admin-form-section">
    <h3 class="admin-form-section-title"><i class="mdui-icon material-icons">cloud_download</i>探针</h3>
    <div class="mdui-row">
        <div class="mdui-col mdui-textfield">
            <label class="mdui-textfield-label">status-agent 下载根地址（可选）</label>
            <input class="mdui-textfield-input" type="text" value="{{setting.status_agent_url}}" key="status_agent_url" placeholder="留空则从 github.com/ewehiuw3743283478/status/releases 下载">
        </div>
    </div>
</div>

<div class="admin-form-section">
    <h3 class="admin-form-section-title"><i class="mdui-icon material-icons">notifications</i>Telegram 通知</h3>
    <div class="mdui-row mdui-row-md-3">
        <div class="mdui-col mdui-textfield">
            <label class="mdui-textfield-label">telegram通知 bot token</label>
            <input class="mdui-textfield-input" type="password" value="{{setting.bot.token}}" key="bot.token" autocomplete="off">
        </div>
        <div class="mdui-col mdui-textfield">
            <label class="mdui-textfield-label">通知chat id列表(用,分割)</label>
            <input class="mdui-textfield-input" type="text" value="{{setting.bot.chatIds}}" key="bot.chatIds" isarray=1>
        </div>
        <div class="mdui-col mdui-textfield">
            <label class="mdui-textfield-label">使用webhook</label>
            <label class="mdui-switch">
                <input type="checkbox" {%if setting.bot.webhook%}checked{%endif%} key="bot.webhook">
                <i class="mdui-switch-icon"></i>
            </label>
        </div>
    </div>
</div>

<div class="admin-form-section">
    <label class="mdui-checkbox">
        <input type="checkbox" {%if setting.debug%}checked{%endif%} key="debug">
        <i class="mdui-checkbox-icon"></i>调试模式
    </label>
</div>
{%endblock%}

{%block admin_fab%}
<div class="mdui-fab-wrapper">
    <button class="mdui-fab mdui-ripple mdui-color-theme-accent" onclick="edit()">
        <i class="mdui-icon material-icons">save</i>
    </button>
</div>
{%endblock%}

{%block js%}
<script>
async function edit(){
    var setting={};
    function gen(x,keys,val){
        if(keys.length==0)return;
        var key=keys[0];
        keys.shift();
        if(keys.length==0)x[key]=val;
        else{
            if(!x[key])x[key]={};
            gen(x[key],keys,val)
        };
    }
    for(var x of document.querySelectorAll("[key]")){
        var val=x.value;
        if(x.type=="number")val=Number(x.value);
        if(x.type=="checkbox")val=x.checked;
        if(x.getAttribute("isarray"))val=val.split(",");
        if(x.getAttribute("key")==="password"&&!String(val||"").trim())continue;
        gen(setting,x.getAttribute("key").split('.'),val);
    }
    var baseline=JSON.parse(E("setting_data").textContent||"{}");
    for(var [key,val] of Object.entries(baseline))
        if(JSON.stringify(setting[key])===JSON.stringify(val))delete setting[key];
    startloading();
    var res=await postjson(`/admin/setting`,setting);
    endloading();
    notice(res.data);
}
document.addEventListener("keydown",(e)=>{
    if((window.navigator.platform.match("Mac")?e.metaKey:e.ctrlKey)&&e.keyCode==83){
        e.preventDefault();edit();
    }
},false);
</script>
{%endblock%}
