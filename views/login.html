{%set title = "登录"%}
{%extends "./base.html"%}
{%block content%}
<div class="auth-wrap">
    <div class="mdui-card">
        <div class="mdui-card-primary">
            <div class="mdui-card-primary-title">登录</div>
            <div class="mdui-card-primary-subtitle">{{setting.site.name}}</div>
        </div>
        <div class="mdui-card-content">
            <div class="mdui-textfield mdui-textfield-floating-label">
                <i class="mdui-icon material-icons">lock</i>
                <label class="mdui-textfield-label">管理密码</label>
                <input class="mdui-textfield-input" type="password" id="password">
            </div>
        </div>
        <div class="mdui-card-actions">
            <button class="mdui-btn mdui-btn-raised mdui-color-theme-accent mdui-text-color-white btn" id="login" style="width:100%;">
                <i class="mdui-icon material-icons">login</i> 登录
            </button>
        </div>
    </div>
</div>
{%endblock%}
{%block js%}
<script src="/js/md5.min.js"></script>
<script src="/js/login.js"></script>
{%endblock%}
